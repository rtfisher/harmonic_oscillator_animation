name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmonic_oscillator_animation
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: harmonic_oscillator_animation/environment.yml
          activate-environment: harmonic_oscillator_animation
          auto-activate-base: false

      - name: Lint with ruff
        shell: bash -el {0}
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        shell: bash -el {0}
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: harmonic_oscillator_animation
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: harmonic_oscillator_animation/environment.yml
          activate-environment: harmonic_oscillator_animation
          auto-activate-base: false

      - name: Install virtual display for PyQt6
        run: sudo apt-get install -y xvfb libgl1

      - name: Run tests with virtual display
        shell: bash -el {0}
        run: xvfb-run --auto-servernum pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: harmonic_oscillator_animation/.coverage
