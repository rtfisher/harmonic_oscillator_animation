name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmonic_oscillator_animation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy matplotlib PyQt6 ruff && pip install -e .

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: harmonic_oscillator_animation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy matplotlib PyQt6 pytest pytest-qt pytest-cov && pip install -e .

      - name: Install Qt system libraries
        run: |
          sudo apt-get install -y \
            xvfb libgl1 libegl1 \
            libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0

      - name: Run tests with virtual display
        env:
          PYTEST_QT_API: pyqt6
          QT_QPA_PLATFORM: xcb
        run: xvfb-run --auto-servernum pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: harmonic_oscillator_animation/.coverage

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    defaults:
      run:
        working-directory: harmonic_oscillator_animation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: harmonic_oscillator_animation/dist/*
          generate_release_notes: true
