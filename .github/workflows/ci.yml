name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmonic_oscillator_animation
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: harmonic_oscillator_animation/environment.yml
          activate-environment: harmonic_oscillator_animation
          auto-activate-base: false

      - name: Install package
        shell: bash -el {0}
        run: pip install -e .

      - name: Lint with ruff
        shell: bash -el {0}
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        shell: bash -el {0}
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: harmonic_oscillator_animation
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: harmonic_oscillator_animation/environment.yml
          activate-environment: harmonic_oscillator_animation
          auto-activate-base: false

      - name: Install package
        shell: bash -el {0}
        run: pip install -e .

      - name: Install virtual display for PyQt6
        run: sudo apt-get install -y xvfb libgl1

      - name: Run tests with virtual display
        shell: bash -el {0}
        env:
          PYTEST_QT_API: pyqt6
        run: xvfb-run --auto-servernum pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: harmonic_oscillator_animation/.coverage

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    defaults:
      run:
        working-directory: harmonic_oscillator_animation
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: harmonic_oscillator_animation/environment.yml
          activate-environment: harmonic_oscillator_animation
          auto-activate-base: false

      - name: Install build tools
        shell: bash -el {0}
        run: pip install build

      - name: Build wheel and sdist
        shell: bash -el {0}
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: harmonic_oscillator_animation/dist/*
          generate_release_notes: true
